<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX.FIT — 텍스트 편집기</title>
<style>
:root {
  --bg:#05050d; --sur:#0a0a18; --sur2:#0f0f22;
  --orange:#FF6835; --orange-lt:#FF8C5A;
  --text:#F0F4F8; --muted:#7A8899;
  --border:rgba(255,255,255,.08); --success:#22C55E; --red:#E63222;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.s-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.s-logo strong{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
.s-logo em{color:var(--orange);font-style:normal;}
.s-logo small{display:block;color:var(--muted);font-size:.7rem;margin-top:3px;}
.nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;color:var(--muted);font-size:.875rem;font-weight:500;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--orange);border-left-color:var(--orange);background:rgba(255,104,53,.08);}
.nav-item .badge{margin-left:auto;background:var(--sur2);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:.65rem;color:var(--muted);}
.s-foot{padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.btn-open{padding:10px;background:var(--orange);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem;transition:background .2s;}
.btn-open:hover{background:var(--orange-lt);}
.btn-reset-all{padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;}
.btn-reset-all:hover{border-color:rgba(255,80,80,.4);color:#ff6060;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:36px 44px 100px;}
.sec-head{margin-bottom:28px;}
.sec-title{font-size:1.3rem;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;}
.sec-desc{color:var(--muted);font-size:.85rem;}
.form-section{display:none;}
.form-section.active{display:block;}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.field-wrap{display:flex;flex-direction:column;gap:5px;}
.field-wrap.full{grid-column:1/-1;}
.field-wrap.full-3{grid-column:1/-1;}
.f-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.f-input,.f-textarea{background:var(--sur2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;font-size:.88rem;font-family:inherit;transition:border-color .2s;outline:none;width:100%;}
.f-input:focus,.f-textarea:focus{border-color:var(--orange);}
.f-textarea{min-height:72px;resize:vertical;}
.f-hint{font-size:.7rem;color:var(--muted);}
.divider{grid-column:1/-1;height:1px;background:var(--border);margin:4px 0;}
.sub-label{grid-column:1/-1;font-size:.8rem;font-weight:600;color:var(--orange);padding-top:8px;}

/* ── SAVE BAR ── */
.save-bar{position:fixed;bottom:0;left:230px;right:0;background:rgba(5,5,13,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:14px 44px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.save-msg{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:8px;}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.save-dot.changed{background:var(--orange);box-shadow:0 0 8px var(--orange);}
.save-dot.saved{background:var(--success);box-shadow:0 0 8px var(--success);}
.save-actions{display:flex;gap:10px;}
.btn-save{padding:11px 28px;background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.9rem;transition:all .2s;}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,104,53,.4);}

/* ── TOAST ── */
.toast{position:fixed;top:24px;right:24px;background:var(--success);color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;font-size:.9rem;transform:translateY(-80px);opacity:0;transition:all .3s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="s-logo">
    <strong>APEX<em>.</em>FIT</strong>
    <small>텍스트 편집기 v1.0</small>
  </div>
  <nav class="nav" id="navList"></nav>
  <div class="s-foot">
    <button class="btn-open" onclick="openHomepage()">홈페이지 열기 →</button>
    <button class="btn-reset-all" onclick="resetAll()">전체 초기화</button>
  </div>
</aside>

<main class="main" id="mainArea"></main>

<div class="save-bar">
  <div class="save-msg">
    <div class="save-dot" id="saveDot"></div>
    <span id="saveMsg">저장된 내용 없음</span>
  </div>
  <div class="save-actions">
    <button class="btn-save" onclick="saveAll()">💾 저장 &amp; 적용</button>
  </div>
</div>

<div class="toast" id="toast">✓ 저장되었습니다! 홈페이지를 새로고침하세요.</div>

<script>
const SCHEMA = [
  {
    id:'hero', title:'히어로 섹션', icon:'🏠',
    desc:'첫 화면에 표시되는 메인 타이틀, 배지, 부제목',
    fields:[
      {key:'hero_badge', label:'배지 텍스트', type:'text', def:'프리미엄 퍼스널 트레이닝'},
      {key:'hero_h1_1', label:'타이틀 1행', type:'text', def:'한계는'},
      {key:'hero_h1_2', label:'타이틀 2행 (강조색)', type:'text', def:'당신이 정한다'},
      {key:'hero_sub',  label:'부제목 문구', type:'textarea', def:'최첨단 장비와 전문 트레이너가 함께하는 맞춤형 피트니스 경험.\n당신의 목표를 현실로 만드는 공간, APEX FITNESS.', cls:'full'},
      {key:'hero_cta',  label:'CTA 버튼 텍스트', type:'text', def:'무료 체험 시작하기'},
    ]
  },
  {
    id:'stats', title:'통계 수치', icon:'📊',
    desc:'히어로 아래 표시되는 4개의 주요 숫자',
    fields:[
      {key:'stat1_num', label:'통계 1 숫자', type:'text', def:'1200'},
      {key:'stat1_lbl', label:'통계 1 레이블', type:'text', def:'누적 회원 수'},
      {key:'stat2_num', label:'통계 2 숫자', type:'text', def:'24'},
      {key:'stat2_lbl', label:'통계 2 레이블', type:'text', def:'주간 그룹 클래스'},
      {key:'stat3_num', label:'통계 3 숫자', type:'text', def:'15'},
      {key:'stat3_lbl', label:'통계 3 레이블', type:'text', def:'전문 트레이너'},
      {key:'stat4_num', label:'통계 4 숫자', type:'text', def:'8'},
      {key:'stat4_lbl', label:'통계 4 레이블', type:'text', def:'운영 년수'},
    ]
  },
  {
    id:'training', title:'트레이닝 섹션', icon:'💪',
    desc:'1:1 PT 및 그룹 트레이닝 소개 텍스트',
    fields:[
      {key:'pt_tag',   label:'PT 태그', type:'text', def:'개인 맞춤 트레이닝'},
      {key:'pt_title', label:'PT 타이틀', type:'text', def:'당신만을 위한 1:1 프로그램'},
      {key:'pt_desc',  label:'PT 설명', type:'textarea', def:'체형 분석부터 식단 관리까지, 전담 트레이너가 당신의 라이프스타일에 맞는 완전 맞춤형 플랜을 제공합니다. 혼자가 아닌 전문가와 함께.', cls:'full'},
      {key:'pt_mv',    label:'PT 지표 수치', type:'text', def:'98%'},
      {key:'pt_ml',    label:'PT 지표 레이블', type:'text', def:'목표 달성률'},
      {key:'grp_tag',  label:'그룹 태그', type:'text', def:'그룹 & 기능성 트레이닝'},
      {key:'grp_title',label:'그룹 타이틀', type:'text', def:'함께할 때 더 강해진다'},
      {key:'grp_desc', label:'그룹 설명', type:'textarea', def:'HIIT, 크로스핏, 요가, 필라테스까지 다양한 그룹 클래스를 통해 동기부여와 함께 체력을 키우세요. 매주 새로운 프로그램이 업데이트됩니다.', cls:'full'},
      {key:'grp_mv',   label:'그룹 지표 수치', type:'text', def:'+40%'},
      {key:'grp_ml',   label:'그룹 지표 레이블', type:'text', def:'평균 체력 향상'},
    ]
  },
  {
    id:'programs', title:'멤버십 프로그램', icon:'📋',
    desc:'3가지 멤버십 플랜 이름과 설명',
    fields:[
      {key:'p1_name', label:'플랜 1 이름', type:'text', def:'베이직 멤버십'},
      {key:'p1_desc', label:'플랜 1 설명', type:'textarea', def:'기구 이용 무제한, 그룹 클래스 월 8회 포함. 처음 시작하는 분들을 위한 입문 플랜.', cls:'full'},
      {key:'p2_name', label:'플랜 2 이름 (인기)', type:'text', def:'프리미엄 PT'},
      {key:'p2_desc', label:'플랜 2 설명', type:'textarea', def:'주 2회 1:1 퍼스널 트레이닝 + 기구 무제한 + 그룹 클래스 무제한. 빠른 결과를 원하는 분께.', cls:'full'},
      {key:'p3_name', label:'플랜 3 이름', type:'text', def:'엘리트 패키지'},
      {key:'p3_desc', label:'플랜 3 설명', type:'textarea', def:'주 5회 PT + 영양사 1:1 상담 + 체성분 월간 분석. 대회 준비 및 고강도 변화를 목표로.', cls:'full'},
    ]
  },
  {
    id:'info', title:'업체 정보', icon:'🏢',
    desc:'위치, 운영시간, 연락처 정보',
    fields:[
      {key:'inf_addr',  label:'주소 1행', type:'text', def:'서울시 강남구 테헤란로 123'},
      {key:'inf_addr2', label:'주소 2행', type:'text', def:'APEX빌딩 B1–B2층'},
      {key:'inf_sub',   label:'지하철 안내', type:'text', def:'2호선 강남역 3번 출구 도보 3분'},
      {key:'inf_park',  label:'주차 안내', type:'text', def:'건물 내 2시간 무료 주차 가능'},
      {key:'inf_week',  label:'평일 운영시간', type:'text', def:'06:00 – 23:00'},
      {key:'inf_sat',   label:'토요일 운영시간', type:'text', def:'07:00 – 21:00'},
      {key:'inf_sun',   label:'일요일 운영시간', type:'text', def:'08:00 – 18:00'},
      {key:'inf_hol',   label:'공휴일 운영시간', type:'text', def:'09:00 – 17:00'},
      {key:'inf_phone', label:'전화번호', type:'text', def:'02-1234-5678'},
      {key:'inf_email', label:'이메일', type:'text', def:'info@apexfitness.kr'},
      {key:'inf_kakao', label:'카카오톡', type:'text', def:'@apexfitness'},
    ]
  },
  {
    id:'cta', title:'CTA 배너', icon:'📣',
    desc:'하단 무료 체험 신청 배너 텍스트',
    fields:[
      {key:'cta_h2',  label:'배너 타이틀', type:'text', def:'오늘 바로 첫 걸음을 내딛어 보세요'},
      {key:'cta_desc',label:'배너 설명', type:'textarea', def:'첫 방문 무료 체험 및 전문 트레이너 1:1 상담을 제공합니다. 부담 없이 시작하세요.', cls:'full'},
      {key:'cta_btn', label:'CTA 버튼', type:'text', def:'무료 체험 예약하기'},
    ]
  },
  {
    id:'footer', title:'푸터', icon:'📄',
    desc:'하단 브랜드 소개, 저작권, 사업자 정보',
    fields:[
      {key:'ft_brand', label:'브랜드 한 줄 소개', type:'textarea', def:'당신의 한계를 뛰어넘는 프리미엄 피트니스 센터. 최고의 트레이너, 최신 시설, 맞춤형 프로그램.', cls:'full'},
      {key:'ft_copy',  label:'저작권 문구', type:'text', def:'© 2026 APEX FITNESS. All rights reserved.'},
      {key:'ft_biz',   label:'사업자 정보', type:'text', def:'서울시 강남구 테헤란로 123 · 사업자등록번호 123-45-67890'},
    ]
  }
];

let currentIdx = 0;
let dirty = false;

function getStored(){
  try{ return JSON.parse(localStorage.getItem('apexContent')||'{}'); }
  catch(e){ return {}; }
}

function renderNav(){
  const nav = document.getElementById('navList');
  nav.innerHTML = SCHEMA.map((s,i)=>`
    <div class="nav-item${i===0?' active':''}" onclick="switchSection(${i})">
      <span>${s.icon}</span>
      <span>${s.title}</span>
      <span class="badge">${s.fields.length}</span>
    </div>
  `).join('');
}

function renderSections(){
  const main = document.getElementById('mainArea');
  const stored = getStored();
  main.innerHTML = SCHEMA.map((s,i)=>`
    <div class="form-section${i===0?' active':''}" id="sec_${s.id}">
      <div class="sec-head">
        <div class="sec-title">${s.icon} ${s.title}</div>
        <div class="sec-desc">${s.desc}</div>
      </div>
      <div class="fields-grid">
        ${s.fields.map(f=>{
          const val = stored[f.key] !== undefined ? stored[f.key] : f.def;
          const cls = f.cls || '';
          if(f.type==='textarea'){
            return `<div class="field-wrap ${cls}">
              <label class="f-label">${f.label}</label>
              <textarea class="f-textarea" data-field="${f.key}" oninput="markDirty()">${escHtml(val)}</textarea>
            </div>`;
          }
          return `<div class="field-wrap ${cls}">
            <label class="f-label">${f.label}</label>
            <input class="f-input" type="text" data-field="${f.key}" value="${escAttr(val)}" oninput="markDirty()">
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/"/g,'&quot;'); }

function switchSection(i){
  currentIdx = i;
  document.querySelectorAll('.nav-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.querySelectorAll('.form-section').forEach((el,j)=>el.classList.toggle('active',j===i));
}

function markDirty(){
  dirty = true;
  document.getElementById('saveDot').className = 'save-dot changed';
  document.getElementById('saveMsg').textContent = '저장되지 않은 변경사항이 있습니다';
}

function saveAll(){
  const stored = getStored();
  document.querySelectorAll('[data-field]').forEach(el=>{
    stored[el.dataset.field] = el.value;
  });
  localStorage.setItem('apexContent', JSON.stringify(stored));
  dirty = false;
  document.getElementById('saveDot').className = 'save-dot saved';
  document.getElementById('saveMsg').textContent = '저장 완료 — 홈페이지를 새로고침하세요';
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function resetAll(){
  if(!confirm('모든 텍스트를 기본값으로 초기화하시겠습니까?')) return;
  localStorage.removeItem('apexContent');
  renderSections();
  document.getElementById('saveDot').className = 'save-dot';
  document.getElementById('saveMsg').textContent = '기본값으로 초기화되었습니다';
}

function openHomepage(){
  window.open('index.html','_blank');
}

renderNav();
renderSections();

// Check if there's already saved content
const s = getStored();
if(Object.keys(s).length){
  document.getElementById('saveDot').className = 'save-dot saved';
  document.getElementById('saveMsg').textContent = '저장된 내용이 있습니다';
}
</script>
</body>
</html>
